name: Flasher Prebuild
# Builds the generic (unconfigured) ESP32 firmware for each env x version and publishes
# them to the public `flasher-artifacts` branch, where the browser tool fetches them via
# raw (no token). The web tool specializes each generic bin to a target/domain/phrase
# in-browser, so one bin per env serves every target on that env.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Which version to (re)build"
        required: true
        default: "both"
        type: choice
        options: ["both", "v4.0.1", "v3.6.3", "rnode"]
  push:
    branches: ["lua-slot/v4", "lua-slot/v3.6.3"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["v4.0.1", "v3.6.3"]
        env:
          - Unified_ESP32_2400_TX_via_UART
          - Unified_ESP32_2400_RX_via_UART
          - Unified_ESP32_900_TX_via_UART
          - Unified_ESP32_900_RX_via_UART
          - Unified_ESP32_LR1121_TX_via_UART
          - Unified_ESP32_LR1121_RX_via_UART
    steps:
      - name: Decide whether this version is in scope
        id: scope
        run: |
          WANT="${{ inputs.version }}"
          case "${{ github.ref }}" in
            refs/heads/lua-slot/v4)     PUSHED="v4.0.1" ;;
            refs/heads/lua-slot/v3.6.3) PUSHED="v3.6.3" ;;
            *)                          PUSHED="" ;;
          esac
          if [ -n "$PUSHED" ]; then
            [ "${{ matrix.version }}" = "$PUSHED" ] && echo "run=true" >> "$GITHUB_OUTPUT" || echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "$WANT" = "both" ] || [ "$WANT" = "${{ matrix.version }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Map version -> branch
        if: steps.scope.outputs.run == 'true'
        id: map
        run: |
          case "${{ matrix.version }}" in
            v4.0.1) echo "ref=lua-slot/v4" >> "$GITHUB_OUTPUT" ;;
            v3.6.3) echo "ref=lua-slot/v3.6.3" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/checkout@v6
        if: steps.scope.outputs.run == 'true'
        with: { ref: "${{ steps.map.outputs.ref }}" }

      - name: Provide hardware target definitions
        if: steps.scope.outputs.run == 'true'
        run: |
          rm -rf src/hardware
          git clone --depth 1 https://github.com/ExpressLRS/targets.git src/hardware

      - uses: actions/setup-python@v6
        if: steps.scope.outputs.run == 'true'
        with: { python-version: "3.10" }
      - name: Cache PlatformIO
        if: steps.scope.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ matrix.env }}
      - name: Install PlatformIO
        if: steps.scope.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install platformio wheel intelhex
      - name: Build generic firmware
        if: steps.scope.outputs.run == 'true'
        working-directory: src
        run: |
          case "${{ matrix.env }}" in
            *_2400_*) DOMAIN="-DRegulatory_Domain_ISM_2400" ;;
            *)        DOMAIN="-DRegulatory_Domain_FCC_915" ;;
          esac
          PLATFORMIO_BUILD_FLAGS="$DOMAIN" pio run -e "${{ matrix.env }}"
          mkdir -p "$RUNNER_TEMP/out/${{ matrix.version }}/${{ matrix.env }}"
          cp ".pio/build/${{ matrix.env }}/firmware.bin" \
             "$RUNNER_TEMP/out/${{ matrix.version }}/${{ matrix.env }}/firmware.bin"
      - name: Upload built bin
        if: steps.scope.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.version }}-${{ matrix.env }}
          path: ${{ runner.temp }}/out/

  build-rnode:
    runs-on: ubuntu-latest
    if: ${{ inputs.version == 'rnode' }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Akceptor/RNode_Firmware
          ref: master

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/bin sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ESP32 core
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: ${{ runner.os }}-arduino-esp32-2.0.17

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Build firmware-lora32_v21
        run: |
          # arduino-cli requires sketch dir to match .ino filename
          cp -r . /tmp/RNode_Firmware
          arduino-cli compile \
            --fqbn esp32:esp32:ttgo-lora32 \
            --build-property 'build.partitions.csv=/tmp/RNode_Firmware/min_spiffs.csv' \
            --build-property "upload.maximum_size=2097152" \
            --build-property 'compiler.cpp.extra_flags=-DBOARD_MODEL=0x37' \
            --output-dir /tmp/rnode-out \
            /tmp/RNode_Firmware
          mkdir -p "$RUNNER_TEMP/out/rnode/lora32_v21"
          cp /tmp/rnode-out/RNode_Firmware.ino.bin \
             "$RUNNER_TEMP/out/rnode/lora32_v21/firmware.bin"

      - name: Upload built bin
        uses: actions/upload-artifact@v4
        with:
          name: fw-rnode-lora32_v21
          path: ${{ runner.temp }}/out/

  publish:
    needs: [build, build-rnode]
    if: ${{ !cancelled() }}   # publish whatever built, even if some envs failed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Collect built bins
        uses: actions/download-artifact@v4
        with:
          pattern: fw-*
          merge-multiple: true
          path: built
      - name: Commit to flasher-artifacts (single push, no matrix race)
        run: |
          if [ ! -d built ] || [ -z "$(find built -name firmware.bin)" ]; then
            echo "No bins were built (nothing in scope) — skipping publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin flasher-artifacts || true
          if git rev-parse --verify origin/flasher-artifacts >/dev/null 2>&1; then
            git checkout flasher-artifacts
          else
            git checkout --orphan flasher-artifacts
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp -r built/* .
          rm -rf built
          git add .
          git commit -m "prebuild: publish generic ESP32 firmware [skip ci]" || echo "no change"
          git push origin flasher-artifacts
